<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohit | Link in Bio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Poppins (for body) and Orbitron (for cinematic feel) -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <img src="assets/web.png" class="web-left" alt="">
<img src="assets/web.png" class="web-right" alt="">

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Initializing Web Matrix...</p>
    </div>

    <div class="lightning-flash" id="lightning-flash"></div>
    <div class="rain-container" id="rain-container"></div>

    <!-- Floating Particles Container -->
    <div id="particles-js"></div>
    <div class="skyline-layer" id="skyline-layer"></div>

    <div id="app-container">
        <!-- Header Section -->
        <header class="header">
            <div class="profile-container">
                <img src="profile.webp" alt="Profile" class="profile-img">
            </div>
            <h1 class="name">Mohit</h1>
            <p class="username">@Orewajuffy</p>
            <p class="bio">Creator • Developer • Anime Lover</p>
        </header>

        <!-- Social Links Section -->
        <main class="links-container">
            <!-- Link Button Template -->
            <a href="https://t.me/Codelinkk" target="_blank" class="link-card telegram" data-ripple-color="#0088cc">
                <i class="fab fa-telegram-plane icon"></i>
                <span class="link-text">Telegram</span>
                <span class="arrow-icon">→</span>
            </a>

            <a href="https://www.instagram.com/mohitexi?igsh=czZja2FxZjN6dms0" target="_blank" class="link-card instagram" data-ripple-color="#e1306c">
                <i class="fab fa-instagram icon"></i>
                <span class="link-text">Instagram</span>
                <span class="arrow-icon">→</span>
            </a>

            <a href="https://www.youtube.com/@orewamonkeyking" target="_blank" class="link-card youtube" data-ripple-color="#ff0000">
                <i class="fab fa-youtube icon"></i>
                <span class="link-text">YouTube</span>
                <span class="arrow-icon">→</span>
            </a>

            <a href="https://github.com/igmarin97" target="_blank" class="link-card github" data-ripple-color="#ffffff">
                <i class="fab fa-github icon"></i>
                <span class="link-text">GitHub</span>
                <span class="arrow-icon">→</span>
            </a>

            <a href="https://discord.com/users/Orewajuffy" target="_blank" class="link-card discord" data-ripple-color="#5865f2">
                <i class="fab fa-discord icon"></i>
                <span class="link-text">Discord</span>
                <span class="arrow-icon">→</span>
            </a>
        </main>

        <!-- Footer Section -->
        <footer class="footer">
            <div id="spider-icon" class="spider-swing-icon"><i class="fas fa-spider"></i></div>
            Made with ❤️ by Mohit
        </footer>
    </div>

    <!-- Particles.js Library for Floating Particles -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
